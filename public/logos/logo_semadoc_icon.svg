<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <defs>
    <linearGradient id="docGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3A6BC5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2B579A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F2C811;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E0B400;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Document body -->
  <path d="M12,4 L60,4 L80,24 L80,84 Q80,92 72,92 L12,92 Q4,92 4,84 L4,12 Q4,4 12,4 Z"
        fill="url(#docGrad)" />
  <!-- Document fold -->
  <path d="M60,4 L60,24 L80,24 Z" fill="#2B579A" opacity="0.5" />

  <!-- Star schema: connection lines (drawn first) -->
  <line x1="42" y1="37" x2="42" y2="15" stroke="#F2C811" stroke-width="2.5" opacity="0.7" />
  <line x1="42" y1="37" x2="61" y2="48" stroke="#F2C811" stroke-width="2.5" opacity="0.7" />
  <line x1="42" y1="37" x2="23" y2="48" stroke="#F2C811" stroke-width="2.5" opacity="0.7" />

  <!-- Star schema: center node (fact table) -->
  <circle cx="42" cy="37" r="8" fill="url(#accentGrad)" />

  <!-- Star schema: outer nodes (dimensions) -->
  <circle cx="42" cy="15" r="5" fill="url(#accentGrad)" />
  <circle cx="61" cy="48" r="5" fill="url(#accentGrad)" />
  <circle cx="23" cy="48" r="5" fill="url(#accentGrad)" />

  <!-- Pulse line -->
  <path d="M14,72 L24,72 L28,62 L34,80 L38,68 L42,76 L46,72 L66,72"
        fill="none" stroke="#F2C811" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
</svg>
